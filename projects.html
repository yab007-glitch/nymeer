<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="1ife Projects - Explore our innovative solutions making a difference in communities worldwide.">
    <title>Projects - 1ife</title>
    <meta http-equiv="refresh" content="3;url=index.html#projects">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0b;
            --text: #fafafa;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --muted: #71717a;
            --card-bg: #111113;
            --border: #27272a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .redirect-message {
            max-width: 500px;
            margin: 0 auto;
        }

        .redirect-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            display: block;
        }

        .redirect-message h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .redirect-message p {
            font-size: 1.25rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .redirect-links {
            margin-top: 2rem;
        }

        .redirect-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            margin: 0 1rem;
            transition: color 0.2s;
        }

        .redirect-links a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .redirect-message h1 {
                font-size: 1.75rem;
            }

            .redirect-message p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="redirect-message">
        <div class="redirect-icon">🚀</div>
        <h1>Projects - 1ife</h1>
        <p>Our projects page has been moved to our main site for a better experience.</p>
        <p>You will be redirected to the Projects section in <span class="countdown">3</span> seconds...</p>
        <div class="redirect-links">
            <a href="index.html#projects">Go to Projects Section →</a><br>
            <a href="index.html">Return to Homepage</a>
        </div>
    </div>

    <script>
        // Countdown timer
        let countdown = 3;
        const countdownElement = document.querySelector('.countdown');

        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;

            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html#projects';
            }
        }, 1000);
    </script>
</body>
</html>
