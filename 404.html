<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - 1ife">
    <meta name="theme-color" content="#6366f1">
    <title>404 - Page Not Found | 1ife</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0b;
            --text: #fafafa;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --muted: #71717a;
            --border: #27272a;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 25% 25%, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradientShift 5s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            margin: 1rem 0 0.5rem;
            letter-spacing: -0.02em;
        }
        p {
            color: var(--muted);
            font-size: 1.125rem;
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s, transform 0.2s;
        }
        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        .btn svg { width: 20px; height: 20px; }
        footer {
            position: absolute;
            bottom: 2rem;
            color: var(--muted);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>This page doesn't exist, but your one life is very real. Let's get you back on track.</p>
    <a href="/" class="btn">
        Back to Home
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
    </a>
    <footer>&copy; <span id="year"></span> 1ife. All rights reserved.</footer>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
